<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Dungeon Card Crawler</title>
    <meta name="theme-color" content="#090a0c">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        :root {
            --bg-color: #090a0c;
            --card-bg: #15171e;
            --card-border: #2d313d;
        }
        body {
            margin: 0;
            background-color: var(--bg-color);
            color: #e5e7eb;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        canvas {
            display: block;
            background: var(--bg-color);
        }
        .log-box {
            position: absolute;
            top: 60px; /* Перенесли вверх, с отступом от счетчика прогресса */
            left: 50%;
            transform: translateX(-50%);
            width: 80%; /* Ограничили ширину, чтобы не накладываться на другие элементы */
            text-align: center;
            pointer-events: none;
            color: #94a3b8;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: opacity 0.3s;
            z-index: 20;
        }
        #inventory-display {
            position: absolute;
            bottom: 20px;
            display: flex;
            gap: 10px;
            z-index: 20;
            align-items: flex-end; /* Выравниваем слоты по низу */
            padding: 0 10px; /* Добавим отступы по бокам */
        }
        .inventory-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .inventory-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .inventory-label {
            font-size: 0.65rem;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
        }
        .inventory-slot {
            width: 50px;
            height: 50px;
            border: 2px solid #374151;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 900;
            color: #4b5563;
            transition: all 0.2s;
        }
        .inventory-slot.filled.attack {
            background-color: #f59e0b;
            border-color: #fcd34d;
            color: white;
        }
        .inventory-slot.filled.defense {
            background-color: #3b82f6;
            border-color: #60a5fa;
            color: white;
        }
        .weapon-slot {
            width: 64px; height: 64px;
            cursor: pointer;
            background-color: #1f2937;
            border: 2px solid #4b5563;
            flex-direction: column; /* Располагаем урон и заряды вертикально */
            justify-content: center; /* Выравниваем по центру */
            gap: 2px; /* Небольшой отступ между текстами */
            padding: 4px 0; /* Вертикальные отступы */
        }
        .weapon-slot > div {
            pointer-events: none; /* Делаем текст "прозрачным" для кликов */
        }
        .progress-box {
            position: absolute;
            top: 20px;
            right: 20px;
            pointer-events: none;
            color: #94a3b8;
            font-size: 1rem;
            font-weight: 700;
            z-index: 20;
        }
        #level-buttons-container {
            display: flex;
            flex-direction: column-reverse;
            align-items: stretch;
            width: 80%;
            max-width: 320px;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(9, 10, 12, 0.9);
            z-index: 30;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #e5e7eb;
            padding: 20px;
            text-align: center;
        }
        .overlay h2 { font-size: 2rem; font-weight: 900; margin-bottom: 1rem; }
        .overlay p { color: #94a3b8; margin-bottom: 2rem; }
        .overlay .button { background-color: #1f2937; border: 1px solid #374151; padding: 0.75rem 1.5rem; border-radius: 0.5rem; cursor: pointer; margin: 0.5rem; transition: background-color 0.2s; }
        .overlay .button:hover { background-color: #374151; }
        .overlay .button.primary { background-color: #166534; border-color: #16a34a; color: white;}
        #exit-level-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 20;
            background-color: rgba(31, 41, 55, 0.7);
            border: 1px solid #374151;
            color: #94a3b8;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        #boss-inventory-display {
            position: absolute;
            top: 100px; /* Отступ от верха */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 20;
            align-items: flex-start; /* Выравниваем по верху */
            padding: 0 10px;
        }
        #exit-level-btn:hover { background-color: #374151; color: white; }
    </style>
    <style>
        /* Стили для админки */
        #admin-btn { position: absolute; top: 65px; left: 20px; z-index: 35; background-color: rgba(31, 41, 55, 0.7); border: 1px solid #374151; color: #94a3b8; padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
        #editor-level-list { display: flex; flex-direction: column-reverse; }
        #admin-btn:hover { background-color: #374151; color: white; }
        .editor-level-item { display: flex; align-items: center; justify-content: space-between; background-color: #1f2937; border: 1px solid #374151; padding: 0.75rem 1.5rem; border-radius: 0.5rem; margin-bottom: 0.5rem; width: 100%; }
        .editor-level-item.dragging { opacity: 0.5; background-color: #374151; }
        .drag-handle { cursor: grab; font-size: 1.5rem; color: #6b7280; margin-right: 1rem; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem; text-align: left; width: 100%; max-width: 400px; }
        .form-grid label { color: #94a3b8; font-size: 0.8rem; }
        .form-grid input { background-color: #1f2937; border: 1px solid #374151; border-radius: 0.25rem; padding: 0.5rem; width: 100%; }
        .full-width { grid-column: 1 / -1; }
        .lock-toggle-btn, .delete-level-btn, .edit-level-btn { background: none; border: none; cursor: pointer; color: #6b7280; transition: color 0.2s; width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center; }
        .lock-toggle-btn:hover { color: #9ca3af; }
        .lock-toggle-btn { font-size: 1.2rem; }
        .delete-level-btn:hover { color: #ef4444; }
        .delete-level-btn { font-size: 1.2rem; }
        .edit-level-btn:hover { color: #60a5fa; }
        .edit-level-btn { font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="game-container">
        <button id="exit-level-btn" style="display: none;">Выход</button>
        <button id="admin-btn" style="display: none;">Админка</button>
        <canvas id="gameCanvas"></canvas>
        <div id="progress-display" class="progress-box" style="display: none;"></div>
        <div id="inventory-display"></div>
        <div id="boss-inventory-display" style="display: none;"></div>
        <div id="game-log" class="log-box opacity-0">Система готова...</div>
    </div>

    <div id="level-select-screen" class="overlay" style="display: none;">
        <h2>ВЫБОР УРОВНЯ</h2>
        <p class="text-slate-500 mb-4">Выберите сектор для развертывания</p>
        <div id="level-buttons-container"></div>
    </div>

    <div id="victory-screen" class="overlay" style="display: none;">
        <h2>УРОВЕНЬ ПРОЙДЕН</h2>
        <p>Вы успешно достигли конца. Отличная работа!</p>
        <div>
            <button id="next-level-btn" class="button primary">Следующий уровень</button>
            <button class="button" onclick="showLevelSelect()">Меню уровней</button>
        </div>
    </div>

    <div id="game-over-screen" class="overlay" style="display: none;">
        <h2>СИСТЕМА ПОВРЕЖДЕНА</h2>
        <p>Ваше здоровье упало до нуля. Миссия провалена.</p>
        <button id="restart-level-btn" class="button primary">Начать заново</button>
        <button class="button" onclick="showLevelSelect()">Меню уровней</button>
    </div>

    <div id="level-editor-screen" class="overlay" style="display: none;">
        <h2>РЕДАКТОР УРОВНЕЙ</h2>
        <div id="editor-level-list" class="w-full max-w-md my-4"></div>
        <div>
            <button id="create-new-level-btn" class="button primary">Создать уровень</button>
            <button class="button" onclick="showLevelSelect()">Назад</button>
        </div>
    </div>

    <div id="create-level-screen" class="overlay" style="display: none;">
        <h2 id="create-level-title">СОЗДАНИЕ УРОВНЯ</h2>
        <div class="form-grid">
            <div class="full-width">
                <label for="level-name">Название уровня</label>
                <input type="text" id="level-name">
            </div>
            <div>
                <label for="level-rows">Длина (ряды)</label>
                <input type="number" id="level-rows" min="3" max="100">
            </div>
            <div>
                <label for="level-boss-hp">Множитель HP босса (от HP игрока)</label>
                <input type="number" id="level-boss-hp" min="0.1" step="0.1">
            </div>
            <h3 class="full-width text-lg font-bold mt-4">Шансы появления объектов (%)</h3>
            <!-- Поля для шансов будут добавлены динамически -->
        </div>
        <div>
            <button id="save-level-btn" class="button primary">Сохранить</button>
            <button id="cancel-create-level-btn" class="button">Отмена</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const logEl = document.getElementById('game-log');
        const progressDisplayEl = document.getElementById('progress-display');
        const inventoryDisplayEl = document.getElementById('inventory-display');
        const exitLevelBtn = document.getElementById('exit-level-btn');

        const COLS = 5;
        const VISIBLE_ROWS = 4; 
        let TILE_WIDTH = 0;
        let TILE_HEIGHT = 0;

        const levelSelectScreen = document.getElementById('level-select-screen');
        const victoryScreen = document.getElementById('victory-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const adminBtn = document.getElementById('admin-btn');
        const levelEditorScreen = document.getElementById('level-editor-screen');
        const createLevelScreen = document.getElementById('create-level-screen');
        const bossInventoryDisplayEl = document.getElementById('boss-inventory-display');

        let CARD_PADDING = 6;
        
        const OBJECT_TYPES = {
            EMPTY: 'empty',
            ENEMY: 'enemy',
            HEAL: 'heal',
            ENERGY: 'energy',
            WALL: 'wall',
            ATTACK_BOOST: 'attack_boost',
            DEFENSE_BOOST: 'defense_boost',
            AMMO: 'ammo',
            BOSS_DAMAGE: 'boss_damage',
            // Шансы для генерации
            CHANCE_CONFIG: 'chance_config'
        };

        const ENEMY_STATES = {
            IDLE: 'idle',
            ALERT: 'alert'
        };

        const ENEMY_TYPES = {
            TYPE_1: {
                visionRange: 5,
                actionRange: 5,
                hp: 4,
                color: '#f87171',
                label: 'СНАЙПЕР'
            },
            TYPE_2: {
                visionRange: 2,
                actionRange: 2,
                hp: 8,
                color: '#ef4444',
                label: 'СТРАЖ'
            }
        };

        const ITEM_VALUES = {
            ATTACK_BOOST: {
                value: 3,
                label: "АТАКА"
            },
            DEFENSE_BOOST: {
                value: 2,
                label: "ЗАЩИТА"
            }
        };

        // Шансы по умолчанию для генератора уровней
        const DEFAULT_SPAWN_CHANCES = {
            [OBJECT_TYPES.ENEMY]: 14,
            [OBJECT_TYPES.WALL]: 4,
            [OBJECT_TYPES.HEAL]: 4,
            [OBJECT_TYPES.ENERGY]: 4,
            [OBJECT_TYPES.ATTACK_BOOST]: 4,
            [OBJECT_TYPES.DEFENSE_BOOST]: 4,
            [OBJECT_TYPES.AMMO]: 4,
        };

        const SPAWN_CHANCE_LABELS = {
            [OBJECT_TYPES.ENEMY]: "Враг",
            [OBJECT_TYPES.WALL]: "Стена",
            [OBJECT_TYPES.HEAL]: "Здоровье",
            [OBJECT_TYPES.ENERGY]: "Энергия",
            [OBJECT_TYPES.ATTACK_BOOST]: "Бонус атаки",
            [OBJECT_TYPES.DEFENSE_BOOST]: "Бонус защиты",
            [OBJECT_TYPES.AMMO]: "Заряды",
        };

        const LEVELS = [
            { id: 1, rows: 30, name: "Сектор 1", chances: { ...DEFAULT_SPAWN_CHANCES }, bossHp: 1.5 },
            { id: 2, rows: 50, name: "Сектор 2", chances: { ...DEFAULT_SPAWN_CHANCES }, bossHp: 1.5 },
            { id: 3, rows: 75, name: "Ядро", chances: { ...DEFAULT_SPAWN_CHANCES }, bossHp: 1.5 }
        ];
        let nextLevelId = 4;

        // Функция для пересчета порогов вероятности
        function calculateChanceThresholds(chances) {
            const thresholds = {};
            let cumulative = 100;
            for (const key in chances) { cumulative -= chances[key]; thresholds[key] = cumulative / 100; }
            return thresholds;
        }

        let gameState = {
            player: {
                hp: 20,
                maxHp: 20,
                energy: 10,
                maxEnergy: 10,
                pos: { x: 2, y: 0 },
                inventory: {
                    attack: [],
                    defense: []
                },
                weapon: {
                    attack: 5,
                    range: 3,
                    charges: 3,
                    maxCharges: 3
                },
                hasFiredWeaponThisTurn: false,
            },
            rows: [],
            scrollY: 0,
            targetScrollY: 0,
            isMoving: false,
            pulse: 0,
            currentLevelIndex: -1,
            appState: 'menu', // menu, playing, bossfight, victory, gameover,
            boss: {
                isActive: false,
                hp: 0,
                maxHp: 0,
                isDefeated: true,
                pos: { x: 2, y: 0 },
                inventory: {
                    attack: [],
                    defense: []
                }
            },
            turn: 'player', // player, boss
            floatingTexts: [],
        };

        function init() {
            resize();
            loadLevels();
            showLevelSelect();
            requestAnimationFrame(update);
            
            window.addEventListener('resize', resize);
        }

        exitLevelBtn.onclick = showLevelSelect;
        adminBtn.onclick = showLevelEditor;

        function startLevel(levelIndex) {
            gameState.currentLevelIndex = levelIndex;
            gameState.appState = 'playing';

            // Сброс состояния игрока
            gameState.player = {
                hp: 20, maxHp: 20, energy: 10, maxEnergy: 10, pos: { x: 2, y: 0 },
                inventory: {
                    attack: [],
                    defense: []
                },
                weapon: {
                    attack: 5,
                    range: 3,
                    charges: 3,
                    maxCharges: 3
                },
                hasFiredWeaponThisTurn: false,
            };
            gameState.boss = {
                isActive: false,
                hp: 0,
                maxHp: 0,
                isDefeated: true,
                pos: { x: 2, y: 0 },
                inventory: {
                    attack: [],
                    defense: []
                }
            };
            
            generateLevel(LEVELS[levelIndex].rows);
            
            // Сброс камеры
            gameState.scrollY = 0;
            gameState.targetScrollY = 0;
            gameState.isMoving = false;

            if (TILE_HEIGHT !== TILE_WIDTH) resize(); // Возвращаем обычные размеры, если они были изменены
            // Скрыть оверлеи
            levelSelectScreen.style.display = 'none';
            victoryScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            canvas.addEventListener('click', handleInput);
            progressDisplayEl.style.display = 'block';
            adminBtn.style.display = 'none';
            exitLevelBtn.style.display = 'block';
        }

        function showLevelSelect() {
            gameState.appState = 'menu';
            levelSelectScreen.style.display = 'flex';
            victoryScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            levelEditorScreen.style.display = 'none';
            createLevelScreen.style.display = 'none';
            canvas.removeEventListener('click', handleInput);
            progressDisplayEl.style.display = 'none';
            adminBtn.style.display = 'block';
            exitLevelBtn.style.display = 'none';

            const container = document.getElementById('level-buttons-container');
            container.innerHTML = '';
            LEVELS.forEach((level, index) => {
                const button = document.createElement('button');
                button.innerText = `${level.name} (${level.rows} рядов)`;
                button.className = 'button';
                button.onclick = () => startLevel(index);
                container.appendChild(button);
            });
        }

        function showLevelEditor() {
            levelSelectScreen.style.display = 'none';
            createLevelScreen.style.display = 'none';
            levelEditorScreen.style.display = 'flex';
            adminBtn.style.display = 'none';
            renderLevelEditorList();

            document.getElementById('create-new-level-btn').onclick = () => showCreateLevelScreen(null);
        }

        function renderLevelEditorList() {
            const container = document.getElementById('editor-level-list');
            container.innerHTML = '';
            LEVELS.forEach((level, index) => {
                const item = document.createElement('div');
                item.className = 'editor-level-item';
                item.draggable = true;
                item.dataset.levelId = level.id;

                item.innerHTML = `
                    <div>
                        <span class="drag-handle">⠿</span>
                        <span>${level.name} (${level.rows} рядов)</span>
                    </div>
                    <div class="flex items-center gap-4">                        
                        <button class="edit-level-btn" data-level-id="${level.id}">
                            ✏️
                        </button>
                        <button class="delete-level-btn" data-level-id="${level.id}">
                            🗑️
                        </button>
                    </div>
                `;
                container.appendChild(item);
            });

            container.querySelectorAll('.edit-level-btn').forEach(button => {
                button.addEventListener('click', (e) => {
                    const levelId = parseInt(e.currentTarget.dataset.levelId);
                    showEditLevelScreen(levelId);
                });
            });

            container.querySelectorAll('.delete-level-btn').forEach(button => {
                button.addEventListener('click', (e) => {
                    const levelId = parseInt(e.currentTarget.dataset.levelId);
                    const levelIndex = LEVELS.findIndex(l => l.id === levelId);
                    if (levelIndex > -1) {
                        if (confirm(`Вы уверены, что хотите удалить уровень "${LEVELS[levelIndex].name}"?`)) {
                            LEVELS.splice(levelIndex, 1);
                            saveLevels();
                            renderLevelEditorList(); // Перерисовываем список
                        }
                    }
                });
            });
            setupDragAndDrop();
        }

        function setupDragAndDrop() {
            const container = document.getElementById('editor-level-list');
            let draggingElement = null;

            container.addEventListener('dragstart', e => {
                draggingElement = e.target;
                e.dataTransfer.effectAllowed = 'move';
                setTimeout(() => draggingElement.classList.add('dragging'), 0);
            });

            container.addEventListener('dragend', e => {
                draggingElement.classList.remove('dragging');
                draggingElement = null;

                // Обновляем порядок в массиве LEVELS
                const newOrderIds = [...container.children].map(child => parseInt(child.dataset.levelId));
                // newOrderIds уже содержит ID в порядке от нижнего к верхнему (визуально)
                // Сортируем массив LEVELS в соответствии с этим новым порядком
                LEVELS.sort((a, b) => newOrderIds.indexOf(a.id) - newOrderIds.indexOf(b.id));
                saveLevels();
            });

            container.addEventListener('dragover', e => {
                e.preventDefault();
                const afterElement = getDragAfterElement(container, e.clientY);
                if (afterElement == null) {
                    container.appendChild(draggingElement);
                } else {
                    container.insertBefore(draggingElement, afterElement);
                }
            });
        }

        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('.editor-level-item:not(.dragging)')];
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        function showCreateLevelScreen(levelId = null) {
            const isEditing = levelId !== null;
            const level = isEditing ? LEVELS.find(l => l.id === levelId) : null;

            if (isEditing && !level) {
                message("ОШИБКА: УРОВЕНЬ НЕ НАЙДЕН");
                return;
            }

            levelEditorScreen.style.display = 'none';
            createLevelScreen.style.display = 'flex';

            const titleEl = document.getElementById('create-level-title');
            const saveBtn = document.getElementById('save-level-btn');

            // Заполняем форму
            document.getElementById('level-name').value = isEditing ? level.name : `Сектор ${LEVELS.length + 1}`;
            document.getElementById('level-rows').value = isEditing ? level.rows : 30;
            document.getElementById('level-boss-hp').value = isEditing ? level.bossHp : 1.5;
            
            const formGrid = createLevelScreen.querySelector('.form-grid');
            // Очищаем старые поля, кроме первых двух
            formGrid.querySelectorAll('.spawn-chance-field').forEach(el => el.remove());

            const chancesSource = isEditing ? level.chances : DEFAULT_SPAWN_CHANCES;
            for (const key in DEFAULT_SPAWN_CHANCES) {
                const value = chancesSource[key] || DEFAULT_SPAWN_CHANCES[key];
                const labelText = SPAWN_CHANCE_LABELS[key] || key;
                const fieldHtml = `
                    <div class="spawn-chance-field">
                        <label for="chance-${key}">${labelText}</label>
                        <input type="number" id="chance-${key}" data-key="${key}" value="${value}" min="0" max="50">
                    </div>`;
                formGrid.insertAdjacentHTML('beforeend', fieldHtml);
            }

            if (isEditing) {
                titleEl.innerText = "РЕДАКТИРОВАНИЕ УРОВНЯ";
                saveBtn.onclick = () => saveLevelChanges(levelId);
            } else {
                titleEl.innerText = "СОЗДАНИЕ УРОВНЯ";
                saveBtn.onclick = saveNewLevel;
            }

            document.getElementById('cancel-create-level-btn').onclick = showLevelEditor;
        }

        function saveNewLevel() {
            const name = document.getElementById('level-name').value;
            const rows = parseInt(document.getElementById('level-rows').value, 10);
            const bossHp = parseFloat(document.getElementById('level-boss-hp').value);
            const chances = {};
            createLevelScreen.querySelectorAll('.form-grid input[data-key]').forEach(input => {
                chances[input.dataset.key] = parseInt(input.value, 10);
            });

            if (name && rows >= 3 && bossHp > 0) {
                const newLevel = { id: nextLevelId++, name, rows, chances, bossHp };
                LEVELS.push(newLevel);
                saveLevels();
                showLevelEditor();
            } else {
                message("ОШИБКА: НЕКОРРЕКТНЫЕ ДАННЫЕ УРОВНЯ");
            }
        }

        function showEditLevelScreen(levelId) {
            showCreateLevelScreen(levelId);
        }

        function saveLevelChanges(levelId) {
            const level = LEVELS.find(l => l.id === levelId);
            if (!level) {
                message("ОШИБКА: НЕ УДАЛОСЬ СОХРАНИТЬ ИЗМЕНЕНИЯ");
                return;
            }

            level.name = document.getElementById('level-name').value;
            level.rows = parseInt(document.getElementById('level-rows').value, 10);
            level.bossHp = parseFloat(document.getElementById('level-boss-hp').value);
            createLevelScreen.querySelectorAll('.form-grid input[data-key]').forEach(input => {
                level.chances[input.dataset.key] = parseInt(input.value, 10);
            });
            saveLevels();
            showLevelEditor();
        }

        function resize() {
            const screenW = window.innerWidth;
            const screenH = window.innerHeight;
            const size = Math.min(screenW / COLS, screenH / VISIBLE_ROWS);
            TILE_WIDTH = size;
            TILE_HEIGHT = size;
            canvas.width = COLS * TILE_WIDTH;
            canvas.height = VISIBLE_ROWS * TILE_HEIGHT;
            gameState.scrollY = gameState.player.pos.y * TILE_HEIGHT;
            gameState.targetScrollY = gameState.scrollY;
            CARD_PADDING = TILE_WIDTH * 0.08;
        }

        function generateLevel(totalRows = 100) {
            const levelConf = LEVELS[gameState.currentLevelIndex];
            const chances = levelConf.chances;
            const thresholds = calculateChanceThresholds(chances);

            const BOSS_AREA_ROWS = 3;
            const playableRows = totalRows; // Не вычитаем, т.к. босс находится в пределах этих рядов
            gameState.rows = [];
            for (let y = 0; y < playableRows; y++) {
                let row = [];
                for (let x = 0; x < COLS; x++) {
                    let type = OBJECT_TYPES.EMPTY, data = null;
                    const rand = Math.random();

                    // Генерируем объекты только до зоны босса
                    if (y > 1 && y < totalRows - BOSS_AREA_ROWS) { 
                        if (rand > thresholds[OBJECT_TYPES.ENEMY]) {
                            type = OBJECT_TYPES.ENEMY;
                            const eType = Math.random() > 0.5 ? 'TYPE_1' : 'TYPE_2';
                            data = { ...ENEMY_TYPES[eType], state: ENEMY_STATES.IDLE, currentHp: ENEMY_TYPES[eType].hp };
                        }
                        else if (rand > thresholds[OBJECT_TYPES.WALL]) type = OBJECT_TYPES.WALL;
                        else if (rand > thresholds[OBJECT_TYPES.HEAL]) type = OBJECT_TYPES.HEAL;
                        else if (rand > thresholds[OBJECT_TYPES.ENERGY]) type = OBJECT_TYPES.ENERGY;
                        else if (rand > thresholds[OBJECT_TYPES.ATTACK_BOOST]) { type = OBJECT_TYPES.ATTACK_BOOST; data = { ...ITEM_VALUES.ATTACK_BOOST }; }
                        else if (rand > thresholds[OBJECT_TYPES.DEFENSE_BOOST]) { type = OBJECT_TYPES.DEFENSE_BOOST; data = { ...ITEM_VALUES.DEFENSE_BOOST }; }
                        else if (rand > thresholds[OBJECT_TYPES.AMMO]) type = OBJECT_TYPES.AMMO;
                    }
                    row.push({ type, data });
                }
                gameState.rows.push(row);
            }
        }

        function handleInput(e) {
            if (gameState.isMoving || (gameState.appState !== 'playing' && gameState.appState !== 'bossfight')) return;

            const rect = canvas.getBoundingClientRect();
            const canvasX = e.clientX - rect.left;
            const canvasY = e.clientY - rect.top;

            if (gameState.appState === 'bossfight' && gameState.turn === 'player') {
                // Логика боссфайта теперь внутри общей логики
            }

            // Определяем, на какую клетку сетки (gx, gy) был клик
            const gx = Math.floor(canvasX / TILE_WIDTH);
            const bossArenaStartRow = gameState.rows.length - 2;
            const gy = Math.floor((gameState.scrollY + canvas.height - canvasY) / TILE_HEIGHT);

            const nextY = gameState.player.pos.y + 1;

            // Логика для боя с боссом
            if (gameState.boss.isActive) {
                if (gy === gameState.player.pos.y) { // Ход на своем ряду
                    processPlayerBossTurn(gx);
                } else if (gy === gameState.boss.pos.y && gx === gameState.boss.pos.x) { // Клик по боссу
                    useWeapon();
                }
                return; // В бою с боссом другие действия невозможны
            }

            // Обрабатываем ввод, только если клик был по следующему ряду
            if (gy === nextY && nextY < gameState.rows.length) {
                if (gameState.rows[nextY][gx].type === OBJECT_TYPES.WALL) {
                    message("ПУТЬ ЗАБЛОКИРОВАН");
                    return;
                }
                
                // Новая логика расхода энергии на прыжки
                const dist = Math.abs(gx - gameState.player.pos.x);

                const energyCost = Math.max(0, dist - 1);

                if (energyCost > 0) {
                    if (gameState.player.energy < energyCost) {
                        message("НЕДОСТАТОЧНО ЭНЕРГИИ ДЛЯ ПРЫЖКА");
                        return;
                    }
                    gameState.player.energy -= energyCost;
                    message(`ПРЫЖОК: -${energyCost} EN`);
                }

                // Урон от врагов в текущем ряду при попытке уйти
                checkAttackOnLeave();
                if (gameState.player.hp <= 0) {
                    checkWinLoss();
                    return;
                }

                // Если игрок кликнул на врага, происходит бой, а не простое перемещение
                if (gameState.rows[nextY][gx].type === OBJECT_TYPES.ENEMY) {
                    if (gameState.player.hp > 0) {
                        attackEnemy(gx, nextY);
                    }
                    return; // Завершаем ход здесь, т.к. бой - это отдельное действие
                }
                
                if (gameState.player.hp > 0) {
                    moveTo(gx, nextY);
                }
            } else if (gy === gameState.player.pos.y) {
                // Обрабатываем клик по текущему ряду - возможно, это выстрел из арбалета
                const cell = gameState.rows[gy][gx];
                if (cell.type === OBJECT_TYPES.ENEMY) {
                    const p = gameState.player;
                    const dist = Math.abs(p.pos.x - gx);

                    // Проверяем условия для выстрела
                    if (p.hasFiredWeaponThisTurn) {
                        message("ВЫСТРЕЛ УЖЕ СОВЕРШЕН В ЭТОМ ХОДУ");
                        return;
                    }
                    if (p.weapon.charges <= 0) {
                        message("НЕТ ЗАРЯДОВ");
                        return;
                    }
                    if (dist > p.weapon.range || !hasLineOfSight(p.pos.x, gx, gy, gy)) {
                        message("ЦЕЛЬ ВНЕ ЗОНЫ ПОРАЖЕНИЯ");
                        return;
                    }
                    // Все условия выполнены, стреляем по конкретной цели
                    useWeapon(gx);
                }
            }
        }

        function checkAttackOnLeave() {
            const y = gameState.player.pos.y;
            const row = gameState.rows[y];
            for (const [x, cell] of row.entries()) {
                if (cell.type === OBJECT_TYPES.ENEMY && cell.data.state === ENEMY_STATES.ALERT) {
                    const dist = Math.abs(x - gameState.player.pos.x);
                    if (dist <= cell.data.actionRange) {
                        const enemyAttack = cell.data.currentHp;
                        const { remainingDamage, blockedAmount } = applyAndConsumeDefenseBoosts(enemyAttack);
                        gameState.player.hp -= remainingDamage;
                        message(`УДАР В СПИНУ: -${remainingDamage} HP (Блок: ${blockedAmount})`);

                        if (gameState.player.hp <= 0) {
                            // Отложенная проверка, чтобы игрок увидел сообщение
                            setTimeout(checkWinLoss, 100);
                        }
                    }
                }
            }
        }

        function moveTo(nx, ny) {
            gameState.player.pos.x = nx;
            gameState.player.pos.y = ny;

            gameState.targetScrollY = ny * TILE_HEIGHT;
            gameState.isMoving = true;

            const cell = gameState.rows[ny][nx];
            if (cell.type !== OBJECT_TYPES.EMPTY) {
                processInteraction(cell, nx, ny);
            }

            gameState.player.hasFiredWeaponThisTurn = false; // Сбрасываем флаг выстрела при переходе на новый ряд
            updateEnemyStates();

            // Проверка на начало боя с боссом
            const bossTriggerRow = gameState.rows.length - 2; // Ряд перед боссом
            if (ny === bossTriggerRow && !gameState.boss.isActive) { // Если игрок зашел в зону босса
                startBossFight();
            } else {
                checkWinLoss();
            }
        }

        function startBossFight() {
            gameState.boss.isActive = true;
            const levelConf = LEVELS[gameState.currentLevelIndex];
            const playerStartHp = gameState.player.maxHp;
            const bossHpMultiplier = levelConf.bossHp || 1.5;
            const bossHp = Math.round(playerStartHp * bossHpMultiplier);
            
            gameState.boss.hp = bossHp;
            gameState.boss.maxHp = bossHp;
            gameState.boss.isDefeated = false;
            gameState.boss.pos = { x: 2, y: gameState.rows.length - 1 }; // Босс на последнем ряду
            gameState.boss.inventory = { attack: [], defense: [] };

            gameState.turn = 'player';
            message("ВНИМАНИЕ: ОБНАРУЖЕНА МАССИВНАЯ ЦЕЛЬ");

            for (let x = 0; x < COLS; x++) spawnBossFightCell(x, gameState.player.pos.y, false); // Генерируем ряд игрока
            for (let x = 0; x < COLS; x++) spawnBossFightCell(x, gameState.boss.pos.y, true); // Генерируем ряд босса
        }

        function processPlayerBossTurn(targetX) {
            if (targetX === gameState.player.pos.x) {
                message("ВЫБЕРИТЕ ДРУГУЮ КЛЕТКУ ДЛЯ ХОДА");
                return;
            }

            // Новая логика расхода энергии на прыжки
            const dist = Math.abs(targetX - gameState.player.pos.x);
            const energyCost = Math.max(0, dist - 1);

            if (energyCost > 0) {
                if (gameState.player.energy < energyCost) {
                    message("НЕДОСТАТОЧНО ЭНЕРГИИ ДЛЯ ПРЫЖКА");
                    return;
                }
                gameState.player.energy -= energyCost;
                message(`ПРЫЖОК: -${energyCost} EN`);
            }

            // Перемещаем игрока
            gameState.player.pos.x = targetX;
            const cell = gameState.rows[gameState.player.pos.y][targetX];
            
            // Взаимодействие с ячейкой
            processInteraction(cell, targetX, gameState.player.pos.y, 'player');

            // Если это клетка атаки, наносим урон боссу
            if (cell.type === OBJECT_TYPES.BOSS_DAMAGE) {
                gameState.boss.hp -= cell.data.value;
                spawnFloatingText(`-${cell.data.value}`, gameState.boss.pos.x, gameState.boss.pos.y, '#fca5a5');
                message(`АТАКА КЛЕТКОЙ: БОСС -${cell.data.value}HP`);
            }

            // Проверка на атаку в ближнем бою
            if (Math.abs(gameState.player.pos.x - gameState.boss.pos.x) <= 1) {
                // Атака только бонусами, если они есть
                const playerBonusAttack = applyAndConsumeAttackBoosts(gameState.boss.pos.x, gameState.boss.pos.y, 'player');
                if (playerBonusAttack > 0) {
                    // gameState.boss.hp уже уменьшен внутри applyAndConsumeAttackBoosts
                    let logMessage = `АТАКА БОНУСОМ: БОСС -${playerBonusAttack}HP`;
                    message(logMessage);
                }
            }

            // Очищаем ячейку после хода
            gameState.rows[gameState.player.pos.y][targetX].type = OBJECT_TYPES.EMPTY;

            // Проверка на победу и передача хода боссу
            if (!checkWinLoss()) {
                gameState.turn = 'boss';
                setTimeout(runBossTurn, 800); // Задержка для хода босса
            }
        }

        function runBossTurn() {
            if (!gameState.boss.isActive || gameState.turn !== 'boss') return;

            const boss = gameState.boss;
            const player = gameState.player;
            const bossRow = gameState.rows[boss.pos.y];

            // AI: выбираем лучший ход
            let bestMove = { x: -1, score: -Infinity };

            for (let x = 0; x < COLS; x++) {
                if (x === boss.pos.x) continue; // Босс должен сделать ход в новую клетку

                let score = 0;
                const cell = bossRow[x];

                // Приоритет 1: Атака игрока
                if (Math.abs(x - player.pos.x) <= 1) {
                    score += 100;
                }
                // Приоритет 2: Сбор бонусов
                if (cell.type === OBJECT_TYPES.ATTACK_BOOST) score += 50;
                if (cell.type === OBJECT_TYPES.DEFENSE_BOOST) score += 40;
                // Приоритет 3: Лечение
                if (cell.type === OBJECT_TYPES.HEAL && boss.hp < boss.maxHp / 2) score += 60;
                // Приоритет 4: Просто подойти ближе
                score -= Math.abs(x - player.pos.x); // Чем ближе, тем лучше

                if (score > bestMove.score) {
                    bestMove = { x, score };
                }
            }

            // Если по какой-то причине ход не найден, выбираем случайный
            if (bestMove.x === -1) {
                let randomX = boss.pos.x;
                while(randomX === boss.pos.x) { randomX = Math.floor(Math.random() * COLS); }
                bestMove.x = randomX;
            }

            // Совершаем ход
            boss.pos.x = bestMove.x;
            const targetCell = bossRow[boss.pos.x];
            processInteraction(targetCell, boss.pos.x, boss.pos.y, 'boss');

            // Если это клетка атаки, наносим урон игроку
            if (targetCell.type === OBJECT_TYPES.BOSS_DAMAGE) {
                const { remainingDamage, blockedAmount } = applyAndConsumeDefenseBoosts(targetCell.data.value, 'player');
                player.hp -= remainingDamage;
                message(`АТАКА КЛЕТКОЙ: ВЫ -${remainingDamage}HP (Блок: ${blockedAmount})`);
            }

            // Проверка на атаку
            if (Math.abs(boss.pos.x - player.pos.x) <= 1) {
                // Атака только бонусами
                const bossBonusAttack = applyAndConsumeAttackBoosts(player.pos.x, player.pos.y, 'boss');
                if (bossBonusAttack > 0) {
                    // Урон игроку уже нанесен внутри applyAndConsumeAttackBoosts
                    const { remainingDamage, blockedAmount } = applyAndConsumeDefenseBoosts(bossBonusAttack, 'player');
                    player.hp -= remainingDamage; // Уменьшаем HP на остаточный урон
                    let logMessage = `АТАКА БОНУСОМ: ВЫ -${remainingDamage}HP (Блок: ${blockedAmount})`;
                    message(logMessage);
                }
            }

            const playerVacatedX = player.pos.x;
            // Очищаем ячейку и генерируем новые для обоих рядов
            bossRow[boss.pos.x].type = OBJECT_TYPES.EMPTY;
            spawnBossFightCell(playerVacatedX, player.pos.y);
            spawnBossFightCell(boss.pos.x, boss.pos.y, true); // true, т.к. это для босса

            if (!checkWinLoss()) {
                gameState.turn = 'player';
                gameState.player.hasFiredWeaponThisTurn = false; // Сбрасываем флаг для нового хода игрока
            }
        }

        function applyAndConsumeAttackBoosts(targetX, targetY, attacker = 'player', enemyTarget = null) {
            const inventory = (attacker === 'player') ? gameState.player.inventory : gameState.boss.inventory;
            const bonusDamage = inventory.attack.reduce((a, b) => a + b, 0);
            if (bonusDamage > 0) {
                if (attacker === 'player') {
                    if (enemyTarget) { // Если цель - обычный враг
                        enemyTarget.currentHp -= bonusDamage;
                        spawnFloatingText(`-${bonusDamage}`, targetX, targetY, '#f59e0b');
                    } else { // Если цель - босс (или нет явной цели, по умолчанию босс)
                        const target = gameState.boss;
                        target.hp -= bonusDamage;
                        spawnFloatingText(`-${bonusDamage}`, targetX, targetY, '#f59e0b');
                    }
                } else { // Если атакует босс, урон проходит через защиту игрока
                    const { remainingDamage, blockedAmount } = applyAndConsumeDefenseBoosts(bonusDamage, 'player');
                    gameState.player.hp -= remainingDamage;
                    spawnFloatingText(`-${remainingDamage}`, targetX, targetY, '#f59e0b');
                }
                inventory.attack = []; // Очищаем инвентарь атаки
            }
            return bonusDamage;
        }

        function applyAndConsumeDefenseBoosts(incomingDamage, defender = 'player') {
            const inventory = (defender === 'player') ? gameState.player.inventory : gameState.boss.inventory;
            let damageLeft = incomingDamage;
            let totalBlocked = 0;
            // Используем бонусы, пока есть урон и бонусы в инвентаре
            while (damageLeft > 0 && inventory.defense.length > 0) {
                const boostValue = inventory.defense.shift(); // Взять и удалить первый бонус
                const blockedByThisBoost = Math.min(damageLeft, boostValue);
                damageLeft -= blockedByThisBoost;
                totalBlocked += blockedByThisBoost;
            }
            return { remainingDamage: damageLeft, blockedAmount: totalBlocked };
        }

        function attackEnemy(nx, ny) {
            const enemy = gameState.rows[ny][nx].data;
            const playerBaseAttack = gameState.player.hp;
            const enemyAttack = enemy.currentHp;

            // Сначала применяем и расходуем бонусы
            const playerBonusAttack = applyAndConsumeAttackBoosts(nx, ny, 'player', enemy);
            const { remainingDamage: damageToPlayer, blockedAmount: blocked } = applyAndConsumeDefenseBoosts(enemyAttack, 'player');
            
            // Затем основная атака
            enemy.currentHp -= playerBaseAttack;
            gameState.player.hp -= damageToPlayer;
            spawnFloatingText(`-${playerBaseAttack}`, nx, ny, '#fca5a5');

            let logMessage = `ОБМЕН УДАРАМИ: ВЫ -${damageToPlayer}HP (Блок: ${blocked}), ВРАГ -${playerBaseAttack}HP`;
            if (playerBonusAttack > 0) logMessage += ` (Бонус: -${playerBonusAttack}HP)`;

            message(logMessage);

            if (enemy.currentHp <= 0) {
                // Враг побежден, игрок перемещается
                gameState.rows[ny][nx].type = OBJECT_TYPES.EMPTY;
                moveTo(nx, ny);
            } else {
                // Враг выжил, игрок остается на месте
                // Обновляем состояние врагов, т.к. игрок остался на том же ряду
                updateEnemyStates();
                checkWinLoss();
            }
        }

        function processInteraction(cell, x, y, interactor = 'player') {
            const subject = (interactor === 'player') ? gameState.player : gameState.boss;
            const subjectName = (interactor === 'player') ? "ИГРОК" : "БОСС";

            // Логика боя с обычными врагами перенесена в attackEnemy, здесь только подбор предметов
            if (cell.type === OBJECT_TYPES.HEAL) {
                subject.hp = Math.min(subject.maxHp, subject.hp + 6);
                if (interactor === 'player') message("ЗДОРОВЬЕ: +6 HP");
            } else if (cell.type === OBJECT_TYPES.ENERGY) {
                if (interactor === 'player') {
                    subject.energy = Math.min(subject.maxEnergy, subject.energy + 4);
                    message("ЭНЕРГИЯ: +4 EN");
                }
            } else if (cell.type === OBJECT_TYPES.ATTACK_BOOST) {
                if (subject.inventory.attack.length < 2) {
                    subject.inventory.attack.push(cell.data.value);
                    if (interactor === 'player') message(`ПОДБОР: +${cell.data.value} К АТАКЕ`);
                } else {
                    if (interactor === 'player') message("СЛОТЫ АТАКИ ЗАПОЛНЕНЫ");
                }
            } else if (cell.type === OBJECT_TYPES.DEFENSE_BOOST) {
                if (subject.inventory.defense.length < 2) {
                    subject.inventory.defense.push(cell.data.value);
                    if (interactor === 'player') message(`ПОДБОР: +${cell.data.value} К ЗАЩИТЕ`);
                } else {
                    if (interactor === 'player') message("СЛОТЫ ЗАЩИТЫ ЗАПОЛНЕНЫ");
                }
            } else if (cell.type === OBJECT_TYPES.AMMO) {
                if (interactor === 'player') {
                    const p = subject;
                    if (p.weapon.charges < p.weapon.maxCharges) {
                        const chargesBefore = p.weapon.charges;
                        p.weapon.charges = Math.min(p.weapon.maxCharges, p.weapon.charges + 3);
                        const chargesAdded = p.weapon.charges - chargesBefore;
                        message(`ПОДБОР: +${chargesAdded} ЗАРЯДА`);
                    } else {
                        message("ЗАРЯДЫ АРБАЛЕТА ПОЛНЫ");
                    }
                }
            }
        }

        function spawnBossFightCell(x, y, isForBoss = false) {
            let type = OBJECT_TYPES.EMPTY;
            let data = null;
            const rand = Math.random();

            if (isForBoss) {
                // Генерация для ряда БОССА: только атака, защита, лечение и клетка урона
                if (rand > 0.65) { // 35%
                    type = OBJECT_TYPES.BOSS_DAMAGE;
                    data = { value: Math.floor(Math.random() * 6) + 5 };
                } else if (rand > 0.40) { // 25%
                    type = OBJECT_TYPES.ATTACK_BOOST;
                    data = { ...ITEM_VALUES.ATTACK_BOOST };
                } else if (rand > 0.15) { // 25%
                    type = OBJECT_TYPES.DEFENSE_BOOST;
                    data = { ...ITEM_VALUES.DEFENSE_BOOST };
                } else { // 15% - Здоровье
                    type = OBJECT_TYPES.HEAL;
                }
            } else {
                // Генерация для ряда ИГРОКА: все возможные бонусы
                if (rand > 0.75) { // 25% - Клетка атаки
                    type = OBJECT_TYPES.BOSS_DAMAGE;
                    data = { value: Math.floor(Math.random() * 6) + 5 };
                } else if (rand > 0.55) { // 20% - Здоровье
                    type = OBJECT_TYPES.HEAL;
                } else if (rand > 0.37) { // 18% - Бонус атаки
                    type = OBJECT_TYPES.ATTACK_BOOST;
                    data = { ...ITEM_VALUES.ATTACK_BOOST };
                } else if (rand > 0.22) { // 15% - Бонус защиты
                    type = OBJECT_TYPES.DEFENSE_BOOST;
                    data = { ...ITEM_VALUES.DEFENSE_BOOST };
                } else if (rand > 0.10) { // 12% - Заряды
                    type = OBJECT_TYPES.AMMO;
                } else { // 10% - Энергия
                    type = OBJECT_TYPES.ENERGY;
                }
            }

            gameState.rows[y][x] = { type, data };
        }

        function updateEnemyStates() {
            gameState.rows.forEach((row, y) => {
                row.forEach((cell, x) => {
                    if (cell.type === OBJECT_TYPES.ENEMY) {
                        if (y === gameState.player.pos.y) {
                            if (hasLineOfSight(gameState.player.pos.x, x, y, y) && Math.abs(x - gameState.player.pos.x) <= cell.data.visionRange) {
                                cell.data.state = ENEMY_STATES.ALERT;
                            }
                        } else {
                            cell.data.state = ENEMY_STATES.IDLE;
                        }
                    }
                });
            });
        }

        function hasLineOfSight(x1, x2, y1, y2) {
            // Простая проверка на одной линии (горизонталь/вертикаль)
            // Для более сложной геометрии потребовался бы алгоритм Брезенхэма
            if (y1 === y2) { // Горизонтальная проверка
                const startX = Math.min(x1, x2) + 1;
                const endX = Math.max(x1, x2) - 1;
                for (let x = startX; x <= endX; x++) {
                    if (gameState.rows[y1][x].type === OBJECT_TYPES.WALL) {
                        return false;
                    }
                }
            } else {
                // Пока не поддерживаем проверку по диагонали или вертикали, считаем что видимость есть
                return true;
            }
            return true; // Препятствий не найдено
        }

        function useWeapon(targetX = null) {
            if (gameState.appState !== 'playing') return;

            // Если игра в процессе движения, запоминаем действие и выполняем его позже
            if (gameState.isMoving) {
                setTimeout(useWeapon, 100); // Попробовать снова через 100мс
                return;
            }

            const p = gameState.player;
            if (p.weapon.charges <= 0) {
                message("НЕТ ЗАРЯДОВ");
                return;
            }
            if (p.hasFiredWeaponThisTurn) {
                message("ВЫСТРЕЛ УЖЕ СОВЕРШЕН");
                return;
            }

            if (gameState.boss.isActive) {
                if (Math.abs(p.pos.x - gameState.boss.pos.x) <= p.weapon.range) {
                    const bonusDamage = applyAndConsumeAttackBoosts(gameState.boss.pos.x, gameState.boss.pos.y, 'player');
                    p.weapon.charges--;
                    p.hasFiredWeaponThisTurn = true;
                    gameState.boss.hp -= p.weapon.attack;
                    spawnFloatingText(`-${p.weapon.attack}`, gameState.boss.pos.x, gameState.boss.pos.y, '#fca5a5');
                    message(`ВЫСТРЕЛ ПО БОССУ: -${p.weapon.attack}HP${bonusDamage > 0 ? ` (Бонус: ${bonusDamage})` : ''}`);
                    renderInventory();
                    checkWinLoss(); // Проверяем, не был ли босс побежден выстрелом
                } else {
                    message("БОСС ВНЕ ЗОНЫ ПОРАЖЕНИЯ");
                }
                return;
            }

            let finalTargetX = -1;
            const y = p.pos.y;

            if (targetX !== null) {
                // Если цель задана явно (кликом по врагу)
                finalTargetX = targetX;
            } else {
                // Если цель не задана (клик по кнопке), используем авто-прицеливание
                const enemiesInRow = [];
                gameState.rows[y].forEach((cell, x) => {
                    if (cell.type === OBJECT_TYPES.ENEMY) {
                        const dist = Math.abs(p.pos.x - x);
                        if (dist > 0 && dist <= p.weapon.range && hasLineOfSight(p.pos.x, x, y, y)) {
                            enemiesInRow.push({ ...cell, x, dist });
                        }
                    }
                });

                if (enemiesInRow.length === 0) {
                    message("НЕТ ЦЕЛЕЙ В ЗОНЕ ПОРАЖЕНИЯ");
                    return;
                }

                // Логика выбора цели
                enemiesInRow.sort((a, b) => {
                    if (a.dist !== b.dist) return a.dist - b.dist;
                    if (b.data.currentHp !== a.data.currentHp) return b.data.currentHp - a.data.currentHp;
                    return a.x - b.x;
                });
                finalTargetX = enemiesInRow[0].x;
            }

            if (finalTargetX === -1) return; // На всякий случай

            const targetCell = gameState.rows[y][finalTargetX];

            // Сначала применяем и расходуем бонусы
            const bonusDamage = applyAndConsumeAttackBoosts(finalTargetX, y, 'player', targetCell.data);

            // Затем основной выстрел
            p.weapon.charges--;
            p.hasFiredWeaponThisTurn = true; // Устанавливаем флаг, что выстрел был
            targetCell.data.currentHp -= p.weapon.attack;
            spawnFloatingText(`-${p.weapon.attack}`, finalTargetX, y, '#fca5a5');

            message(`ВЫСТРЕЛ: ВРАГ -${p.weapon.attack}HP${bonusDamage > 0 ? ` (Бонус: -${bonusDamage}HP)` : ''}. ЗАРЯДОВ: ${p.weapon.charges}`);

            if (targetCell.data.currentHp <= 0) {
                gameState.rows[y][finalTargetX].type = OBJECT_TYPES.EMPTY;
                message("ЦЕЛЬ УНИЧТОЖЕНА");
            }

            renderInventory();
        }

        function checkWinLoss() {
            if (gameState.appState !== 'playing') return false;
            
            // Условие проигрыша
            if (gameState.player.hp <= 0) {
                gameState.appState = 'gameover';
                gameOverScreen.style.display = 'flex';
                document.getElementById('restart-level-btn').onclick = () => startLevel(gameState.currentLevelIndex);
                canvas.removeEventListener('click', handleInput);
                exitLevelBtn.style.display = 'none';
                return true;
            }

            // Условие выигрыша
            if (gameState.boss.isActive && gameState.boss.hp <= 0) {
                gameState.boss.isActive = false;
                gameState.appState = 'victory';
                gameState.boss.isDefeated = true;
                // Разблокируем следующий уровень

                victoryScreen.style.display = 'flex';
                const nextBtn = document.getElementById('next-level-btn');
                const nextLevelIndex = gameState.currentLevelIndex + 1;
                if (nextLevelIndex < LEVELS.length) {
                    nextBtn.style.display = 'inline-block';
                    nextBtn.onclick = () => startLevel(nextLevelIndex);
                } else {
                    nextBtn.style.display = 'none'; // Скрыть кнопку, если это был последний уровень
                }
                canvas.removeEventListener('click', handleInput);
                exitLevelBtn.style.display = 'none';
                return true;
            }
            return false;
        }

        function saveLevels() {
            try {
                localStorage.setItem('dungeonCrawler_levels', JSON.stringify(LEVELS));
                localStorage.setItem('dungeonCrawler_nextLevelId', nextLevelId);
            } catch (e) {
                console.error("Failed to save levels to localStorage", e);
            }
        }

        function loadLevels() {
            const savedLevels = localStorage.getItem('dungeonCrawler_levels');
            const savedNextId = localStorage.getItem('dungeonCrawler_nextLevelId');
            if (savedLevels) {
                const parsedLevels = JSON.parse(savedLevels);
                if (Array.isArray(parsedLevels) && parsedLevels.length > 0) {
                    // Полностью заменяем массив, чтобы сохранить порядок
                    LEVELS.length = 0;
                    parsedLevels.forEach(level => LEVELS.push(level));
                } else {
                    // Если в localStorage пустой массив, а у нас есть уровни по умолчанию, сохраняем их
                    saveLevels();
                }
            }
            if (savedNextId) { nextLevelId = parseInt(savedNextId, 10); }
        }

        function message(text) {
            logEl.innerText = text;
            logEl.style.opacity = "1";
            setTimeout(() => { if(logEl.innerText === text) logEl.style.opacity = "0"; }, 2000);
        }

        function spawnFloatingText(text, gx, gy, color = '#ffffff') {
            gameState.floatingTexts.push({
                text,
                x: gx,
                y: gy,
                color,
                life: 60, // живет 60 кадров (около 1 секунды)
                vy: 0.02, // скорость подъема (в долях клетки за кадр)
                initialY: gy
            });
        }

        function updateFloatingTexts() {
            gameState.floatingTexts.forEach(ft => { ft.y -= ft.vy; ft.life--; });
            gameState.floatingTexts = gameState.floatingTexts.filter(ft => ft.life > 0);
        }

        function update() {
            requestAnimationFrame(update);
            if (gameState.appState !== 'playing') return;
            gameState.pulse = (Math.sin(Date.now() / 200) + 1) / 2;
            if (Math.abs(gameState.targetScrollY - gameState.scrollY) > 0.1) { gameState.scrollY += (gameState.targetScrollY - gameState.scrollY) * 0.15; } else { gameState.scrollY = gameState.targetScrollY; gameState.isMoving = false; }
            updateFloatingTexts();
            render();
            renderInventory();
            renderBossInventory();
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const offset = gameState.scrollY;

            // Обновление счетчика прогресса/HP босса
            if (gameState.boss.isActive) {
                const boss = gameState.boss;
                // Убрали отображение HP босса, но оставили счетчик прогресса
                const totalRows = gameState.rows.length;
                const currentRow = gameState.player.pos.y + 1;
                progressDisplayEl.innerText = `${currentRow} / ${totalRows}`;
            } else if (gameState.appState === 'playing') {
                const totalRows = gameState.rows.length;
                const currentRow = gameState.player.pos.y + 1;
                progressDisplayEl.innerText = `${currentRow} / ${totalRows}`;
            }

            for (let y = 0; y < gameState.rows.length; y++) {
                const bossArenaStartRow = gameState.rows.length - 2;
                const isBossArenaRow = y >= bossArenaStartRow;
                const currentTileHeight = isBossArenaRow ? TILE_HEIGHT * 2 : TILE_HEIGHT;
                const yOffset = isBossArenaRow ? (y - bossArenaStartRow) * TILE_HEIGHT * 2 + (bossArenaStartRow * TILE_HEIGHT) : y * TILE_HEIGHT;

                const drawY = canvas.height - (yOffset - offset) - currentTileHeight;

                if (drawY > -currentTileHeight && drawY < canvas.height + currentTileHeight) {
                    for (let x = 0; x < COLS; x++) {
                        const cell = gameState.rows[y][x];
                        
                        // Стены скрывают объекты
                        let isVisible = true;
                        if (y > gameState.player.pos.y) {
                            for(let checkY = gameState.player.pos.y + 1; checkY < y; checkY++) {
                                if (gameState.rows[checkY][x].type === OBJECT_TYPES.WALL) {
                                    isVisible = false;
                                    break;
                                }
                            }
                        }

                        const isPassed = y < gameState.player.pos.y;
                        const isNextRow = y === gameState.player.pos.y + 1;

                        drawCard(x * TILE_WIDTH, drawY, cell, x, y, isVisible, isPassed, isNextRow, currentTileHeight);
                    }
                }
            }

            // Рендер игрока как отдельной карты поверх сетки
            const bossArenaStartRow = gameState.rows.length - 2;
            const isPlayerInArena = gameState.player.pos.y >= bossArenaStartRow;
            const playerTileHeight = isPlayerInArena ? TILE_HEIGHT * 2 : TILE_HEIGHT;
            const playerYOffset = isPlayerInArena ? (gameState.player.pos.y - bossArenaStartRow) * TILE_HEIGHT * 2 + (bossArenaStartRow * TILE_HEIGHT) : gameState.player.pos.y * TILE_HEIGHT;
            const pY = canvas.height - (playerYOffset - offset) - playerTileHeight;
            if (gameState.player.hp > 0) {
                drawPlayerCard(gameState.player.pos.x * TILE_WIDTH, pY, playerTileHeight);
            }

            // Рендер босса
            if (gameState.boss.isActive && !gameState.boss.isDefeated) drawBoss();

            // Рендер линий прицеливания
            drawTargetingLines();

            // Рендер всплывающего текста поверх всего
            drawFloatingTexts();
        }

        function drawBoss() {
            const offset = gameState.scrollY;
            const boss = gameState.boss;
            const bossArenaStartRow = gameState.rows.length - 2;
            const bossTileHeight = TILE_HEIGHT * 2;
            const bossYOffset = (boss.pos.y - bossArenaStartRow) * bossTileHeight + (bossArenaStartRow * TILE_HEIGHT);

            const drawY = canvas.height - (bossYOffset - offset) - bossTileHeight;

            const w = TILE_WIDTH - CARD_PADDING * 2;
            const h = bossTileHeight - CARD_PADDING * 2;

            ctx.save();
            ctx.translate(boss.pos.x * TILE_WIDTH + CARD_PADDING, drawY + CARD_PADDING);

            // Стиль карты босса
            ctx.fillStyle = "#1a1d26";
            ctx.shadowBlur = 20 + gameState.pulse * 15;
            ctx.shadowColor = "#ef4444";
            ctx.beginPath();
            ctx.roundRect(0, 0, w, h, 12);
            ctx.fill();

            ctx.strokeStyle = `rgba(239, 68, 68, ${0.5 + gameState.pulse * 0.5})`;
            ctx.lineWidth = 3;
            ctx.stroke();

            // Текст
            ctx.textAlign = "center";
            ctx.fillStyle = "#ef4444";
            ctx.font = "bold 9px Inter";
            ctx.fillText("БОСС", w/2, 18);

            // Здоровье
            ctx.fillStyle = "#fff";
            ctx.font = "900 22px Inter";
            ctx.fillText(Math.max(0, boss.hp), w/2, h/2 + 2);
            
            // Подпись HP
            ctx.fillStyle = "#ef4444";
            ctx.font = "8px Inter";
            ctx.fillText("HEALTH", w/2, h/2 + 12);

            ctx.restore();
        }

        function drawTargetingLines() {
            const p = gameState.player;
            if (p.weapon.charges <= 0) return;

            if (gameState.boss.isActive) {
                if (Math.abs(p.pos.x - gameState.boss.pos.x) <= p.weapon.range) {
                    ctx.save();
                    ctx.strokeStyle = `rgba(255, 255, 255, ${0.4 + gameState.pulse * 0.3})`;
                    ctx.lineWidth = 2;
                    ctx.setLineDash([3, 5]);

                    const bossArenaStartRow = gameState.rows.length - 2;
                    const playerYOffset = (p.pos.y - bossArenaStartRow) * TILE_HEIGHT * 2 + (bossArenaStartRow * TILE_HEIGHT);
                    const bossYOffset = (gameState.boss.pos.y - bossArenaStartRow) * TILE_HEIGHT * 2 + (bossArenaStartRow * TILE_HEIGHT);

                    ctx.beginPath();
                    ctx.moveTo((p.pos.x + 0.5) * TILE_WIDTH, canvas.height - (playerYOffset - gameState.scrollY) - TILE_HEIGHT);
                    ctx.lineTo((gameState.boss.pos.x + 0.5) * TILE_WIDTH, canvas.height - (bossYOffset - gameState.scrollY) - TILE_HEIGHT);
                    ctx.stroke();
                    ctx.restore();
                }
            } else {
                const y = p.pos.y;
                const enemiesInRow = [];
                gameState.rows[y].forEach((cell, x) => {
                    if (cell.type === OBJECT_TYPES.ENEMY) {
                        const dist = Math.abs(p.pos.x - x);
                        if (dist > 0 && dist <= p.weapon.range && hasLineOfSight(p.pos.x, x, y, y)) {
                            enemiesInRow.push({ x });
                        }
                    }
                });

                if (enemiesInRow.length > 0) {
                    ctx.save();
                    const pY = canvas.height - (y * TILE_HEIGHT - gameState.scrollY) - TILE_HEIGHT;
                    ctx.strokeStyle = `rgba(255, 255, 255, ${0.4 + gameState.pulse * 0.3})`;
                    ctx.lineWidth = 2;
                    ctx.setLineDash([3, 5]);
                    enemiesInRow.forEach(enemy => {
                        ctx.beginPath();
                        ctx.moveTo((p.pos.x + 0.5) * TILE_WIDTH, pY + TILE_HEIGHT / 2);
                        ctx.lineTo((enemy.x + 0.5) * TILE_WIDTH, pY + TILE_HEIGHT / 2);
                        ctx.stroke();
                    });
                    ctx.restore();
                }
            }
        }

        function drawFloatingTexts() {
            const offset = gameState.scrollY;
            for (const ft of gameState.floatingTexts) {
                const bossArenaStartRow = gameState.rows.length - 2;
                const isBossArenaRow = ft.initialY >= bossArenaStartRow;
                const currentTileHeight = isBossArenaRow ? TILE_HEIGHT * 2 : TILE_HEIGHT;
                const yOffset = isBossArenaRow ? (ft.initialY - bossArenaStartRow) * TILE_HEIGHT * 2 + (bossArenaStartRow * TILE_HEIGHT) : ft.initialY * TILE_HEIGHT;

                const drawY = canvas.height - (yOffset - offset) - currentTileHeight;
                let finalDrawY = drawY;

                // Рассчитываем "плавающее" смещение
                const floatOffset = (ft.initialY - ft.y) * (isBossArenaRow ? TILE_HEIGHT * 2 : TILE_HEIGHT);

                ctx.save();
                ctx.globalAlpha = Math.min(1, ft.life / 30); // Текст плавно исчезает
                ctx.fillStyle = ft.color;
                ctx.font = "900 20px Inter";
                ctx.textAlign = "center";
                ctx.shadowColor = "rgba(0,0,0,0.7)";
                ctx.shadowBlur = 4;

                const xPos = (ft.x + 0.5) * TILE_WIDTH;
                const yPos = finalDrawY + currentTileHeight / 2 - floatOffset;
                ctx.fillText(ft.text, xPos, yPos);
                ctx.restore();
            }
        }

        function renderInventory() {
            const { inventory, weapon } = gameState.player;
            if (inventoryDisplayEl.children.length === 0) {
                // Первоначальное создание элементов
                inventoryDisplayEl.innerHTML = `
                    <div class="inventory-item">
                        <div id="weapon-slot" class="inventory-slot weapon-slot"></div>
                        <div class="inventory-label">Арбалет</div>
                    </div>
                    <div class="inventory-group">
                        <div class="inventory-item">
                            <div id="attack-slot-0" class="inventory-slot"></div>
                            <div class="inventory-label">Атака</div>
                        </div>
                        <div class="inventory-item">
                            <div id="attack-slot-1" class="inventory-slot"></div>
                            <div class="inventory-label">Атака</div>
                        </div>
                        <div class="inventory-item">
                            <div id="defense-slot-0" class="inventory-slot"></div>
                            <div class="inventory-label">Защита</div>
                        </div>
                        <div class="inventory-item">
                            <div id="defense-slot-1" class="inventory-slot"></div>
                            <div class="inventory-label">Защита</div>
                        </div>
                    </div>
                `;
                document.getElementById('weapon-slot').onclick = () => useWeapon();
            }

            // Обновление слота оружия
            const weaponSlot = document.getElementById('weapon-slot');
            weaponSlot.innerHTML = `<div class="text-xs text-slate-400">DMG: ${weapon.attack}</div><div class="text-2xl font-black text-white">${weapon.charges}/${weapon.maxCharges}</div>`;

            // Обновление слотов бустеров
            const updateBoosterSlot = (type, index, value) => {
                const slot = document.getElementById(`${type}-slot-${index}`);
                if (value !== undefined) {
                    slot.classList.add('filled', type);
                    slot.innerText = `+${value}`;
                } else {
                    slot.classList.remove('filled', 'attack', 'defense');
                    slot.innerText = '';
                }
            };

            for (let i = 0; i < 2; i++) {
                updateBoosterSlot('attack', i, inventory.attack[i]);
                updateBoosterSlot('defense', i, inventory.defense[i]);
            }
        }

        function renderBossInventory() {
            if (!gameState.boss.isActive) {
                bossInventoryDisplayEl.style.display = 'none';
                return;
            }

            bossInventoryDisplayEl.style.display = 'flex';
            const { inventory } = gameState.boss;

            if (bossInventoryDisplayEl.children.length === 0) {
                // Первоначальное создание элементов
                // Структура идентична инвентарю игрока, но без оружия
                bossInventoryDisplayEl.innerHTML = `
                    <div class="inventory-group">
                        <div class="inventory-item">
                            <div id="boss-attack-slot-0" class="inventory-slot"></div>
                            <div class="inventory-label">Атака</div>
                        </div>
                        <div class="inventory-item">
                            <div id="boss-attack-slot-1" class="inventory-slot"></div>
                            <div class="inventory-label">Атака</div>
                        </div>
                        <div class="inventory-item">
                            <div id="boss-defense-slot-0" class="inventory-slot"></div>
                            <div class="inventory-label">Защита</div>
                        </div>
                        <div class="inventory-item">
                            <div id="boss-defense-slot-1" class="inventory-slot"></div>
                            <div class="inventory-label">Защита</div>
                        </div>
                    </div>
                `;
            }

            const updateBoosterSlot = (type, index, value) => {
                const slot = document.getElementById(`boss-${type}-slot-${index}`);
                if (value !== undefined) { slot.classList.add('filled', type); slot.innerText = `+${value}`; } 
                else { slot.classList.remove('filled', 'attack', 'defense'); slot.innerText = ''; }
            };

            for (let i = 0; i < 2; i++) {
                updateBoosterSlot('attack', i, inventory.attack[i]);
                updateBoosterSlot('defense', i, inventory.defense[i]);
            }
        }

        function drawCard(x, y, cell, gx, gy, isVisible, isPassed, isNextRow, currentTileHeight) {
            const pad = CARD_PADDING;
            const w = TILE_WIDTH - pad * 2;
            const h = currentTileHeight - pad * 2;
            
            ctx.save();
            ctx.translate(x + pad, y + pad);

            // Чередование цвета рядов для лучшей видимости сетки
            const bg = (gy % 2 === 0) ? "var(--card-bg)" : "#12151c";

            ctx.globalAlpha = 1.0;
            if (isPassed) {
                ctx.globalAlpha = 0.3; // Пройденные ряды тусклые
            } else if (!isVisible) {
                ctx.globalAlpha = 0.5; // Скрытые за стеной ряды
            }

            // Фон клетки
            ctx.fillStyle = bg;
            ctx.beginPath();
            ctx.roundRect(0, 0, w, h, 8);
            ctx.fill();

            // Подсветка поля зрения врагов
            if (isVisible && !isPassed) {
                gameState.rows.forEach((enemyRow, ey) => {
                    enemyRow.forEach((enemyCell, ex) => {
                        if (enemyCell.type === OBJECT_TYPES.ENEMY) {
                            // Подсвечиваем клетки в ряду врага, которые находятся в его поле зрения
                            if (gy === ey && cell.type !== OBJECT_TYPES.WALL && Math.abs(gx - ex) <= enemyCell.data.visionRange && hasLineOfSight(gx, ex, gy, ey)) {
                                ctx.fillStyle = 'rgba(239, 68, 68, 0.2)';
                                ctx.fill();
                            }
                        }
                    });
                });
            }

            // Рамка (с подсветкой для доступного следующего хода)
            if (gameState.boss.isActive && gy === gameState.player.pos.y && gx !== gameState.player.pos.x) {
                const dist = Math.abs(gx - gameState.player.pos.x);
                const energyCost = Math.max(0, dist - 1);
                ctx.lineWidth = 2;
                ctx.shadowBlur = 8;
                ctx.setLineDash([]);

                if (gameState.turn === 'player') {
                    if (energyCost === 0) { // Бесплатный ход
                        ctx.strokeStyle = `rgba(74, 222, 128, ${0.4 + gameState.pulse * 0.4})`;
                        ctx.shadowColor = "rgba(74, 222, 128, 0.3)";
                    } else if (gameState.player.energy >= energyCost) { // Платный, но возможный ход
                        ctx.strokeStyle = `rgba(6, 182, 212, ${0.4 + gameState.pulse * 0.4})`;
                        ctx.shadowColor = "rgba(6, 182, 212, 0.3)";
                    } else { // Невозможный ход из-за нехватки энергии
                        ctx.strokeStyle = `rgba(6, 182, 212, ${0.3 + gameState.pulse * 0.3})`;
                        ctx.shadowColor = "rgba(6, 182, 212, 0.2)";
                        ctx.setLineDash([4, 4]);
                    }
                } else {
                    ctx.strokeStyle = '#2d313d';
                    ctx.shadowColor = 'transparent';
                }
            } else if (isNextRow && isVisible && gameState.appState === 'playing' && !gameState.boss.isActive) {
                const dist = Math.abs(gx - gameState.player.pos.x);
                const energyCost = Math.max(0, dist - 1);
                ctx.lineWidth = 2;
                ctx.shadowBlur = 8;
                ctx.setLineDash([]); // Сброс на сплошную линию по умолчанию

                if (cell.type !== OBJECT_TYPES.WALL) {
                    if (energyCost === 0) { // Бесплатный ход
                        ctx.strokeStyle = `rgba(74, 222, 128, ${0.4 + gameState.pulse * 0.4})`;
                        ctx.shadowColor = "rgba(74, 222, 128, 0.3)";
                    } else if (gameState.player.energy >= energyCost) { // Платный, но возможный ход
                        ctx.strokeStyle = `rgba(6, 182, 212, ${0.4 + gameState.pulse * 0.4})`;
                        ctx.shadowColor = "rgba(6, 182, 212, 0.3)";
                    } else { // Невозможный ход из-за нехватки энергии
                        ctx.strokeStyle = `rgba(6, 182, 212, ${0.3 + gameState.pulse * 0.3})`; // Тот же цвет, но тусклее
                        ctx.shadowColor = "rgba(6, 182, 212, 0.2)";
                        ctx.setLineDash([4, 4]); // Устанавливаем пунктирную линию
                    }
                } else {
                    ctx.strokeStyle = "#2d313d";
                    ctx.shadowColor = "transparent";
                    ctx.lineWidth = 1;
                    ctx.shadowBlur = 0;
                }
            } else {
                ctx.strokeStyle = "#2d313d";
                ctx.lineWidth = 1;
                ctx.shadowBlur = 0;
            }
            ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.setLineDash([]); // Сбрасываем пунктир после отрисовки

            if (cell.type !== OBJECT_TYPES.EMPTY) {
                if (isVisible) {
                    renderContent(cell, w, h);
                } else if (!isPassed) {
                    // Неизвестность за стеной
                    ctx.fillStyle = "#2d313d";
                    ctx.textAlign = "center";
                    ctx.font = "bold 24px Inter";
                    ctx.fillText("?", w/2, h/2 + 8);
                }
            }

            ctx.restore();
        }

        function renderContent(cell, w, h) {
            ctx.textAlign = "center";
            
            if (cell.type === OBJECT_TYPES.WALL) {
                ctx.fillStyle = "#2d313d";
                ctx.fillRect(w*0.1, h*0.1, w*0.8, h*0.8);
                ctx.fillStyle = "#3f4556";
                ctx.font = "bold 10px Inter";
                ctx.fillText("БЛОК", w/2, h/2 + 4);
            }

            if (cell.type === OBJECT_TYPES.ENEMY) {
                const d = cell.data;
                const isAlert = d.state === ENEMY_STATES.ALERT;
                
                // Свечение при тревоге
                if (isAlert) {
                    ctx.shadowBlur = 10 + gameState.pulse * 10;
                    ctx.shadowColor = "#ef4444";
                    ctx.strokeStyle = `rgba(239, 68, 68, ${0.5 + gameState.pulse * 0.5})`;
                    ctx.lineWidth = 2;
                    ctx.strokeRect(-2, -2, w+4, h+4);
                    ctx.shadowBlur = 0;
                }

                // Заголовок
                ctx.fillStyle = isAlert ? "#ef4444" : "#94a3b8";
                ctx.font = "bold 9px Inter";
                ctx.fillText(d.label, w/2, 18);

                // HP Врага
                ctx.fillStyle = "#fff";
                ctx.font = "900 24px Inter";
                ctx.fillText(d.currentHp, w/2, h/2 + 8);
            }

            if (cell.type === OBJECT_TYPES.HEAL) {
                ctx.fillStyle = "#10b981";
                ctx.font = "bold 10px Inter";
                ctx.fillText("ЗДОРОВЬЕ", w/2, 18);
                ctx.font = "900 24px Inter";
                ctx.fillText("+6", w/2, h/2 + 8);
            }

            if (cell.type === OBJECT_TYPES.ENERGY) {
                ctx.fillStyle = "#06b6d4";
                ctx.font = "bold 10px Inter";
                ctx.fillText("ЭНЕРГИЯ", w/2, 18);
                ctx.font = "900 24px Inter";
                ctx.fillText("+4", w/2, h/2 + 8);
            }

            if (cell.type === OBJECT_TYPES.ATTACK_BOOST) {
                ctx.fillStyle = "#f59e0b";
                ctx.font = "bold 10px Inter";
                ctx.fillText(cell.data.label, w/2, 18);
                ctx.font = "900 24px Inter";
                ctx.fillText(`+${cell.data.value}`, w/2, h/2 + 8);
            }

            if (cell.type === OBJECT_TYPES.DEFENSE_BOOST) {
                ctx.fillStyle = "#3b82f6";
                ctx.font = "bold 10px Inter";
                ctx.fillText(cell.data.label, w/2, 18);
                ctx.font = "900 24px Inter";
                ctx.fillText(`+${cell.data.value}`, w/2, h/2 + 8);
            }

            if (cell.type === OBJECT_TYPES.AMMO) {
                ctx.fillStyle = "#a855f7";
                ctx.font = "bold 10px Inter";
                ctx.fillText("ЗАРЯДЫ", w/2, 18);
                ctx.font = "900 24px Inter";
                ctx.fillText("+3", w/2, h/2 + 8);
            }

            if (cell.type === OBJECT_TYPES.BOSS_DAMAGE) {
                ctx.fillStyle = "#ef4444";
                ctx.font = "bold 10px Inter";
                ctx.fillText("АТАКА", w/2, 18);
                ctx.font = "900 24px Inter";
                ctx.fillText(`${cell.data.value}`, w/2, h/2 + 8);
            }

        }

        function drawPlayerCard(x, y, currentTileHeight) {
            const pad = CARD_PADDING;
            const w = TILE_WIDTH - pad * 2;
            const h = currentTileHeight - pad * 2;
            const p = gameState.player;

            ctx.save();
            ctx.translate(x + pad, y + pad);

            // Стиль карты игрока
            ctx.fillStyle = "#1a1d26";
            ctx.shadowBlur = 20;
            ctx.shadowColor = "rgba(74, 222, 128, 0.3)";
            ctx.beginPath();
            ctx.roundRect(0, 0, w, h, 12);
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.strokeStyle = "#4ade80";
            ctx.lineWidth = 2;
            ctx.stroke();

            // Текст
            ctx.textAlign = "center";
            ctx.fillStyle = "#4ade80";
            ctx.font = "bold 9px Inter";
            ctx.fillText("ИГРОК", w/2, 18);

            // Здоровье
            ctx.fillStyle = "#fff";
            ctx.font = "900 22px Inter";
            ctx.fillText(Math.max(0, p.hp), w/2, h/2 + 2);
            
            // Подпись HP
            ctx.fillStyle = "#4ade80";
            ctx.font = "8px Inter";
            ctx.fillText("HEALTH", w/2, h/2 + 12);

            // Энергия (снизу)
            ctx.fillStyle = "#06b6d4";
            ctx.font = "bold 10px Inter";
            ctx.fillText(`EN: ${p.energy}`, w/2, h - 12);


            ctx.restore();
        }

        init();
    </script>
</body>
</html>
